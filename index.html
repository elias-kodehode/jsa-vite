<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jsa-vite-webpage</title>
  </head>
  <body>
    <div id="app">
      <form id="user-form">
        <label>
          <input
            id="username"
            name="username"
            placeholder="username"
            value="123"
          />
        </label>

        <label>
          <input
            id="email"
            name="email"
            type="email"
            placeholder="email"
            value="test@test.com"
          />
        </label>
        <button type="submit">Create</button>
      </form>
      <ul></ul>
    </div>

    <dialog id="edit-modal">
      <form id="edit-form">
        <label>
          Username:
          <input data-edit-username />
        </label>

        <label>
          Email:
          <input data-edit-email />
        </label>

        <button>Cancel</button>
        <button type="submit">Save</button>
      </form>
    </dialog>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
