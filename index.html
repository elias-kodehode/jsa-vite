<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/jsa-vite/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jsa-vite-webpage</title>
    <script type="module" crossorigin src="/jsa-vite/assets/index-Bb5UYa6U.js"></script>
    <link rel="stylesheet" crossorigin href="/jsa-vite/assets/index-DiJMm7vY.css">
  </head>
  <body>
    <div id="app">
      <form id="user-form">
        <label>
          Username:
          <input
            id="username"
            name="username"
            placeholder="username"
            value="123"
          />
        </label>

        <label>
          E-Mail:
          <input
            id="email"
            name="email"
            type="email"
            placeholder="email"
            value="test@test.com"
          />
        </label>

        <label>
          Password:
          <input name="password" type="password" />
        </label>
        <button type="submit">Create</button>
      </form>
      <ul></ul>
    </div>

    <dialog id="edit-modal">
      <form id="edit-form">
        <label>
          Username:
          <input id="username-edit" name="username" data-edit-username />
        </label>

        <label>
          Email:
          <input id="email-edit" type="email" name="email" data-edit-email />
        </label>

        <div id="actions">
          <button type="button">Cancel</button>
          <button type="submit">Save</button>
        </div>
      </form>
    </dialog>

    <dialog id="password-modal">
      <form id="password-form">
        <label
          >Password:
          <input name="password" type="password" />
        </label>
        <button type="submit">Login</button>
        <button type="button">Cancel</button>
      </form>
    </dialog>
  </body>
</html>
